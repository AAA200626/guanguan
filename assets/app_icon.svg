<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A8E6CF"/>
      <stop offset="100%" stop-color="#5CBF9E"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- 圆角方形底 -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="url(#bg)"/>

  <!-- 罐子身体 -->
  <path d="M 156 180 L 156 380 Q 156 440 256 440 Q 356 440 356 380 L 356 180 Z"
        fill="#FFFFFF" fill-opacity="0.9" stroke="#FFFFFF" stroke-width="0"/>

  <!-- 罐子颈部 -->
  <rect x="190" y="130" width="132" height="60" rx="10"
        fill="#FFFFFF" fill-opacity="0.85"/>

  <!-- 罐子盖子 -->
  <rect x="180" y="110" width="152" height="30" rx="14"
        fill="#FFFFFF" fill-opacity="0.95"/>

  <!-- ¥ 符号 -->
  <text x="256" y="340" font-family="Arial,sans-serif" font-size="140"
        font-weight="bold" fill="#5CBF9E" text-anchor="middle">¥</text>

  <!-- 高光 -->
  <ellipse cx="200" cy="200" rx="40" ry="80" fill="url(#shine)" opacity="0.5"/>

  <!-- 罐子边缘线 -->
  <path d="M 156 180 L 156 380 Q 156 440 256 440 Q 356 440 356 380 L 356 180"
        fill="none" stroke="#7DCFB6" stroke-width="3"/>

  <!-- 盖子边缘 -->
  <rect x="180" y="110" width="152" height="30" rx="14"
        fill="none" stroke="#7DCFB6" stroke-width="3"/>
  <rect x="190" y="130" width="132" height="60" rx="10"
        fill="none" stroke="#7DCFB6" stroke-width="3"/>
</svg>
